<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Grid Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&family=Orbitron:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-left" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-right" aria-hidden="true"></div>

    <main class="layout">
      <section class="board-panel">
        <header>
          <p class="subtitle">Reactive Arcade Prototype</p>
          <h1>Neon Grid Tetris</h1>
        </header>
        <canvas id="game-board" width="300" height="600" aria-label="Tetris board"></canvas>
        <p id="message" class="message"></p>
      </section>

      <aside class="info-panel">
        <div class="card">
          <p class="label">Score</p>
          <p id="score" class="value">0</p>
        </div>
        <div class="card">
          <p class="label">Lines</p>
          <p id="lines" class="value">0</p>
        </div>
        <div class="card">
          <p class="label">Level</p>
          <p id="level" class="value">1</p>
        </div>
        <div class="card">
          <p class="label">Speed</p>
          <p id="speed" class="value">x1.00</p>
        </div>
        <div class="card">
          <p class="label">Next</p>
          <canvas id="next-piece" width="120" height="120" aria-label="Next piece"></canvas>
        </div>
        <div class="card controls">
          <p class="label">Controls</p>
          <p>Move: ← →</p>
          <p>Mobile: Swipe Left / Right</p>
          <p>Soft Drop: ↓</p>
          <p>Rotate: ↑ / W</p>
          <p>Hard Drop: Space</p>
          <p>Restart: R</p>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
